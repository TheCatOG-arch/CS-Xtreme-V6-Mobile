<!DOCTYPE html>
<html>
<head>
    <title>CS Xtreme V6 - Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { width: 100%; height: 100%; background: #000; display: none; }
        .btn-launch { padding: 20px 40px; background: #f00; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 18px; }
        #status { margin-top: 20px; color: #0f0; font-family: monospace; font-size: 14px; text-align: center; max-width: 90%; word-wrap: break-word; }
        #progress-bar { width: 80%; height: 10px; background: #333; margin-top: 10px; display: none; border-radius: 5px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #0f0; transition: width 0.2s; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="status">SISTEMA V6 LISTO</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <button class="btn-launch" id="start-button">INICIAR XTREME V6</button>
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>

    <script src="browserfs.min.js"></script>
    <script type="text/javascript">
        var statusEl = document.getElementById('status');
        var progressFill = document.getElementById('progress-fill');
        var progressBar = document.getElementById('progress-bar');

        var Module = {
            canvas: document.getElementById('canvas'),
            arguments: ['-dev', '3', '-log', '-game', 'cstrike'],
            print: function(text) { console.log(text); },
            printErr: function(text) { console.error(text); },
            setStatus: function(text) { statusEl.innerHTML = text; },
            locateFile: function(path) {
                if(path.endsWith('.mem')) return "./xash.html.mem";
                return path;
            }
        };

        async function downloadZip(url, name) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Error al descargar ${name}`);
            const reader = response.body.getReader();
            const contentLength = +response.headers.get('Content-Length');
            let receivedLength = 0;
            let chunks = []; 
            
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                chunks.push(value);
                receivedLength += value.length;
                let step = (receivedLength / (contentLength || 1800000000)) * 100;
                progressFill.style.width = step + '%';
                statusEl.innerHTML = `Descargando ${name}: ${Math.round(step)}%`;
            }
            let allChunks = new Uint8Array(receivedLength);
            let position = 0;
            for(let chunk of chunks) {
                allChunks.set(chunk, position);
                position += chunk.length;
            }
            return allChunks;
        }

        document.getElementById('start-button').onclick = async function() {
            this.style.display = 'none';
            progressBar.style.display = 'block';
            
            try {
                // Descarga de archivos .zip que tienes en GitHub
                const valveData = await downloadZip('./valve.zip', 'Motor Valve');
                const cstrikeData = await downloadZip('./cstrike.zip', 'Paquete V6');

                statusEl.innerHTML = "Montando sistema de archivos...";
                
                BrowserFS.install(window);
                const Buffer = BrowserFS.BFSRequire('buffer').Buffer;

                BrowserFS.configure({
                    fs: "MountableFileSystem",
                    options: {
                        "/valve": { fs: "ZipFS", options: { zipData: Buffer.from(valveData) } },
                        "/cstrike": { fs: "ZipFS", options: { zipData: Buffer.from(cstrikeData) } },
                        "/": { fs: "LocalStorage" }
                    }
                }, function(e) {
                    if (e) return alert("Error de memoria (RAM insuficiente): " + e);
                    
                    statusEl.innerHTML = "Iniciando Xash3D...";
                    document.getElementById('canvas').style.display = 'block';
                    var s = document.createElement('script');
                    s.src = "xash.js";
                    document.body.appendChild(s);
                });
            } catch (err) {
                statusEl.innerHTML = "Error: " + err.message;
            }
        };
    </script>
</body>
</html>
